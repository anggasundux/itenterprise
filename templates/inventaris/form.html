{% extends 'base.html' %}
{% block content %}

<h3>{% if aset %}✏ Edit{% else %}➕ Tambah{% endif %} Aset</h3>
{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="mb-2">
    <label>Kode Aset</label>
    <input type="text" name="kode_aset" class="form-control"
    value="{{ aset.kode_aset|default:'' }}" required>
</div>

<div class="mb-2">
    <label>Nama Aset</label>
    <input type="text" name="nama_aset" class="form-control"
    value="{{ aset.nama_aset|default:'' }}" required>
</div>

<div class="mb-2">
    <label>Kategori</label>
    <input type="text" name="kategori" class="form-control"
    value="{{ aset.kategori|default:'' }}">
</div>

<div class="mb-2">
    <label>Merek</label>
    <input type="text" name="merek" class="form-control"
    value="{{ aset.merek|default:'' }}">
</div>

<div class="mb-2">
    <label>Nomor Seri</label>
    <input type="text" name="nomor_seri" class="form-control"
    value="{{ aset.nomor_seri|default:'' }}">
</div>

<!-- ===== RUANGAN FIX ===== -->

<div class="mb-2">
    <label>Ruangan</label>
    <select name="ruangan" class="form-control" required>
        <option value="">-- Pilih Ruangan --</option>

        {% for r in ruangan_list %}
        <option value="{{ r.id }}"
        {% if aset and aset.ruangan_id == r.id %}selected{% endif %}>
            {{ r }}
        </option>
        {% endfor %}
    </select>
</div>

<!-- ======================= -->

<div class="mb-2">
    <label>Kondisi</label>
    <select name="kondisi" class="form-control">

        <option value="Baik"
        {% if aset and aset.kondisi == "Baik" %}selected{% endif %}>
        Baik</option>

        <option value="Rusak"
        {% if aset and aset.kondisi == "Rusak" %}selected{% endif %}>
        Rusak</option>

        <option value="Maintenance"
        {% if aset and aset.kondisi == "Maintenance" %}selected{% endif %}>
        Maintenance</option>

    </select>
</div>

<div class="mb-2">
    <label>Tanggal Beli</label>
    <input type="date" name="tanggal_beli" class="form-control"
    value="{{ aset.tanggal_beli|date:'Y-m-d' }}">
</div>

<div class="mb-2">
    <label>Keterangan</label>
    <textarea name="keterangan" class="form-control" rows="3">
{{ aset.keterangan|default:'' }}</textarea>
</div>

<button class="btn btn-success">💾 Simpan</button>
<a href="{% url 'inventaris_list' %}" class="btn btn-secondary">⬅ Kembali</a>

</form>

{% endblock %}
