{% extends 'base.html' %}
{% block content %}

<h3 class="mb-3">
{% if barang %}✏ Edit Barang{% else %}➕ Tambah Barang{% endif %}
</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
    <label>Nama Barang</label>
    <input type="text" name="nama_barang" class="form-control"
           value="{{ barang.nama_barang|default:'' }}" required>
</div>

<div class="mb-3">
    <label>Kategori</label>
    <input type="text" name="kategori" class="form-control"
           value="{{ barang.kategori|default:'' }}" required>
</div>

<div class="mb-3">
    <label>Stok</label>
    <input type="number" name="stok" class="form-control"
           value="{{ barang.stok|default:0 }}" required>
</div>

<div class="mb-3">
    <label>Satuan</label>
    <input type="text" name="satuan" class="form-control"
           value="{{ barang.satuan|default:'' }}" required>
</div>

<!-- ✅ GANTI INPUT ID JADI DROPDOWN -->
<div class="mb-3">
    <label>Gudang</label>
    <select name="gudang" class="form-control" required>
        <option value="">-- Pilih Gudang --</option>
        {% for g in gudang_list %}
            <option value="{{ g.id }}"
                {% if barang and barang.gudang_id == g.id %}selected{% endif %}>
                {{ g.nama }} - {{ g.lokasi }}
            </option>
        {% endfor %}
    </select>
</div>

<div class="mb-3">
    <label>Batas Minimum</label>
    <input type="number" name="batas_minimum" class="form-control"
           value="{{ barang.batas_minimum|default:5 }}" required>
</div>

<button class="btn btn-primary">
💾 Simpan
</button>

<a href="{% url 'gudang_list' %}" class="btn btn-secondary">
⬅ Kembali
</a>

</form>

{% endblock %}
