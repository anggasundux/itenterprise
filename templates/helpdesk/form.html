{% extends 'base.html' %}
{% block content %}

<style>
.form-card{
    max-width:700px;
    margin:auto;
}

.form-label{
    font-weight:600;
}

.form-control:focus{
    border-color:#198754;
    box-shadow:0 0 0 .2rem rgba(25,135,84,.25);
}

</style>

<div class="card shadow-sm form-card">

<div class="card-body">

<h4 class="mb-4 text-center">🎫 Buat Tiket Gangguan</h4>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Judul Masalah</label>
<input type="text" name="judul" class="form-control" placeholder="Contoh: Komputer tidak bisa login" required>
</div>

<div class="mb-3">
<label class="form-label">Keterangan</label>
<textarea name="keluhan" class="form-control" rows="4" placeholder="Jelaskan detail gangguan..." required></textarea>
</div>

<div class="mb-3">
<label class="form-label">Ruangan</label>
<select name="ruangan" class="form-select" required>
<option value="">-- Pilih Ruangan --</option>
{% for r in ruangan_list %}
<option value="{{ r.id }}">{{ r.nama }}</option>
{% endfor %}
</select>
</div>

<div class="mb-4">
<label class="form-label">Prioritas</label>
<select name="prioritas" class="form-select">
<option value="rendah">🟢 Rendah</option>
<option value="sedang">🟡 Sedang</option>
<option value="tinggi">🟠 Tinggi</option>
<option value="kritis">🔴 Kritis</option>
</select>
</div>

<div class="d-flex justify-content-between">

<button class="btn btn-success px-4">
💾 Kirim Tiket
</button>

<a href="{% url 'tiket_list' %}" class="btn btn-outline-secondary px-4">
⬅ Kembali
</a>

</div>

</form>

</div>
</div>

{% endblock %}
