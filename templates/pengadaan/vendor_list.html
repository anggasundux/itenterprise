{% extends 'base.html' %}
{% block content %}
<h3>Daftar Vendor</h3>
<div class="mb-3">
  <a href="{% url 'pengadaan:create_vendor' %}" class="btn btn-primary">Tambah Vendor</a>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Nama</th>
      <th>Kontak</th>
      <th>Email</th>
      <th>Alamat</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody>
    {% for v in vendors %}
    <tr>
      <td>{{ v.nama }}</td>
      <td>{{ v.kontak }}</td>
      <td>{{ v.email }}</td>
      <td>{{ v.alamat|linebreaksbr }}</td>
      <td>
        <a href="{% url 'pengadaan:edit_vendor' v.pk %}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{% url 'pengadaan:delete_vendor' v.pk %}" class="btn btn-sm btn-danger" onclick="return confirm('Hapus vendor ini?');">Hapus</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="5" class="text-center">Belum ada vendor</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
