{% extends 'base.html' %}
{% block content %}

<h3>
{% if user_edit %}
✏ Edit User
{% else %}
➕ Tambah User
{% endif %}
</h3>

<form method="post" class="mt-3">
{% csrf_token %}

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control"
value="{{ user_edit.username|default:'' }}" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control"
value="{{ user_edit.email|default:'' }}">
</div>

<div class="mb-3">
<label>Password {% if user_edit %}(kosongkan jika tidak diubah){% endif %}</label>
<input type="password" name="password" class="form-control">
</div>

<button class="btn btn-success">
💾 Simpan
</button>

<a href="{% url 'user_list' %}" class="btn btn-secondary">
Kembali
</a>

</form>

{% endblock %}
