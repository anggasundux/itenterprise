{% extends 'base.html' %}
{% block content %}

<h3>👤 Manajemen User</h3>

<a href="{% url 'user_add' %}" class="btn btn-primary mb-3">
➕ Tambah User
</a>

<table class="table table-bordered table-striped">

<thead class="table-primary text-center">
<tr>
<th>No</th>
<th>Username</th>
<th>Email</th>
<th>Aksi</th>
</tr>
</thead>

<tbody>
{% for u in users %}
<tr>
<td>{{ forloop.counter }}</td>
<td>{{ u.username }}</td>
<td>{{ u.email|default:"-" }}</td>
<td class="text-center">

<a href="{% url 'user_edit' u.id %}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="{% url 'user_delete' u.id %}"
class="btn btn-danger btn-sm"
onclick="return confirm('Hapus user ini?')">
Hapus
</a>

</td>
</tr>
{% empty %}
<tr>
<td colspan="4" class="text-center text-muted">
Belum ada user
</td>
</tr>
{% endfor %}
</tbody>

</table>

{% endblock %}
